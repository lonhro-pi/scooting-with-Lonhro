services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: lonhro-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: lonhro-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME:-lonhro}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-lonhro-dev-password}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-lonhro-org}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-lonhro-fleet}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUX_RETENTION:-30d}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-lonhro-dev-token}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.0.0
    container_name: lonhro-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-lonhro}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-lonhro-dev-password}
      GF_INSTALL_PLUGINS: grafana-worldmap-panel
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    restart: unless-stopped

  bridge-listener:
    build:
      context: ../services/bridge_listener
    container_name: lonhro-bridge-listener
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: Lonhro/Fleet/Update
      HEARTBEAT_TOPIC: Lonhro/Fleet/Heartbeat
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUX_TOKEN:-lonhro-dev-token}
      INFLUX_ORG: ${INFLUX_ORG:-lonhro-org}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-lonhro-fleet}
      BRIDGE_DRY_RUN: "false"
    depends_on:
      - mosquitto
      - influxdb
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  grafana_data:
